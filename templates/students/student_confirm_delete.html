{% extends 'base.html' %}

{% block content %}
<h2>Delete Student</h2>
<p>Are you sure you want to delete <strong>{{ student.full_name }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Confirm Delete</button>
    <a class="btn" href="{% url 'student_list' %}">Cancel</a>
</form>
{% endblock %}
